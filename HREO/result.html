<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>少年英雄觉醒系统 - 测评结果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.8/chart.umd.min.js" integrity="sha512-v0n1B1s11M5u0Y7mQnC4f2tPq5B4Z807V6Fh2S1K6KZ/3q1+X6k1C8q1BxJ22T1FyO5Q0GQZJ8eQvX6mXy22Jg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="system-data.js"></script>
    <script src="sys.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* 参数调整说明：
               1. #2e1437 (深紫): 提升了亮度，不再是死黑，透出紫色
               2. #16362d (深绿): 对应你截图中的绿色，但更有光泽
               3. #3a1c1c (深红): 保留了红色的温润感
               4. #1c2541 (深蓝): 经典的午夜蓝，作为冷暖色的过渡
            */
            background: linear-gradient(-45deg, #2e1437, #16362d, #3a1c1c, #1c2541);
            
            background-size: 400% 400%;
            animation: gradientDark 18s ease infinite;
        }

        @keyframes gradientDark {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="app-view" class="pt-16 flex justify-center">
        <div class="min-w-[300px] max-w-[500px] w-full bg-black rounded-[20px] shadow-2xl relative overflow-hidden">
            
            <section id="scr-result" class="flex flex-col z-50 bg-black overflow-y-auto pb-10 min-h-[600px]">
                
                <div class="relative z-10">
                    <div class="bg-gradient-to-r from-blue-900 to-purple-900 p-6 text-center pt-8">
                        <div class="w-16 h-16 mx-auto mb-3 flex items-center justify-center">
                            <span class="material-symbols-outlined text-5xl text-cyan-400 animate-pulse">psychology</span>
                        </div>
                        <h2 id="res-title" class="text-3xl font-bold text-white mb-2"></h2>
                        <div class="flex justify-center items-center gap-3 mb-4">
                            <div id="mbti-code" class="px-3 py-1 bg-blue-500 text-white text-sm font-bold rounded"></div>
                            <div class="px-3 py-1 bg-yellow-500 text-black text-xs font-bold rounded animate-pulse">潜力觉醒中</div>
                        </div>
                    </div>
                    
                    <div class="px-6 space-y-4 pt-4">
                        <!-- 官方定位 -->
                        <div class="p-4 bg-[#0a0f1a] rounded-xl border-l-4 border-blue-500">
                            <div class="flex items-center gap-2 text-blue-400 text-sm mb-2">
                                <span class="material-symbols-outlined text-sm">verified</span>
                                <span class="font-bold uppercase">官方定位</span>
                            </div>
                            <p id="official-position" class="text-sm text-gray-300 leading-relaxed"></p>
                        </div>
                        
                        <!-- 隐藏必杀技 -->
                        <div class="p-4 bg-[#0a0f1a] rounded-xl border-l-4 border-purple-500">
                            <div class="flex items-center gap-2 text-purple-400 text-sm mb-2">
                                <span class="material-symbols-outlined text-sm">flash_on</span>
                                <span class="font-bold uppercase">隐藏必杀技</span>
                            </div>
                            <p id="hidden-skill" class="text-sm text-gray-300 leading-relaxed">检测到你的"生存护盾"能量较低 (有些迷茫或信心不足)。建议：不要想太远的未来，本周先尝试做一件你擅长的小事，比如做一项运动，建立微小的成就感。</p>
                        </div>
                        
                        <!-- AI建议 -->
                        <div class="p-4 bg-[#0a0f1a] rounded-xl border-l-4 border-yellow-500">
                            <div class="flex items-center gap-2 text-yellow-400 text-sm mb-2">
                                <span class="material-symbols-outlined text-sm">auto_awesome</span>
                                <span class="font-bold uppercase">AI建议</span>
                            </div>
                            <p id="ai-suggestion" class="text-sm text-gray-300 leading-relaxed">你的主阵营是「真理贤者」，逻辑思维强，适合研究探索类工作。建议本周尝试：深度研究一个你感兴趣的问题，做笔记总结规律。</p>
                        </div>
                        
                        <!-- 职业信条雷达图 -->
                        <div class="p-4 bg-[#0a0f1a] rounded-xl border border-cyan-400/30">
                            <div class="text-sm font-bold text-white mb-3">职业信条 (RIASEC)</div>
                            <canvas id="res-radar" height="280"></canvas>
                        </div>
                        
                        <!-- 按钮区域 -->
                        <div class="flex gap-3">
                            <a href="quiz.html" class="flex-1 py-4 bg-gradient-to-r from-blue-500 to-cyan-500 text-black font-bold orbitron rounded-xl text-sm hover:shadow-[0_0_20px_rgba(0,243,255,0.5)] transition-all">
                                重新测试
                            </a>
                            <a href="index.html" class="flex-1 py-4 bg-black border-2 border-blue-500 text-blue-500 font-bold orbitron rounded-xl text-sm hover:shadow-[0_0_20px_rgba(0,243,255,0.3)] transition-all">
                                返回主页
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    const resultData = sys.calculateResult();
    const { primary, mbtiCode, result } = resultData;
    
    const riasec = JSON.parse(localStorage.getItem('sysRiasec')) || { R:0, I:0, A:0, S:0, E:0, C:0 };
    
    // 更新标题和MBTI代码
    document.getElementById('res-title').innerText = result.title;
    document.getElementById('mbti-code').innerText = mbtiCode;
    
    // 更新官方定位
    const officialPosition = document.getElementById('official-position');
    officialPosition.innerText = `在地球Online中，你的官方定位是【${result.title}】- 三步看到终局。`;
    
    // 更新隐藏必杀技
    const hiddenSkill = document.getElementById('hidden-skill');
    hiddenSkill.innerText = `你的隐藏必杀技是【逻辑链爆破】: 用一套推理摧毁对方所有论点。`;
    
    // 更新AI建议
    const aiSuggestion = document.getElementById('ai-suggestion');
    aiSuggestion.innerText = `你的主阵营是「真理贤者」，逻辑思维强，适合研究探索类工作。建议本周尝试：深度研究一个你感兴趣的问题，做笔记总结规律。`;
    
    // 绘制雷达图
    if (typeof Chart === 'undefined') {
        // Chart.js 加载失败时的降级方案
        const canvas = document.getElementById('res-radar');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = Math.min(centerX, centerY) - 20;
        
        ctx.strokeStyle = '#00f3ff';
        ctx.lineWidth = 2;
        ctx.fillStyle = 'rgba(0, 243, 255, 0.1)';
        
        // 绘制六边形
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const angle = (i * Math.PI) / 3 - Math.PI / 2;
            const x = centerX + Math.cos(angle) * radius;
            const y = centerY + Math.sin(angle) * radius;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        
        // 绘制中心到各顶点的线
        for (let i = 0; i < 6; i++) {
            const angle = (i * Math.PI) / 3 - Math.PI / 2;
            const x = centerX + Math.cos(angle) * radius;
            const y = centerY + Math.sin(angle) * radius;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(x, y);
            ctx.stroke();
        }
        
        // 绘制标签
        const labels = ['R(实干)','I(研究)','A(艺术)','S(社交)','E(统帅)','C(秩序)'];
        ctx.fillStyle = '#00f3ff';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        for (let i = 0; i < 6; i++) {
            const angle = (i * Math.PI) / 3 - Math.PI / 2;
            const x = centerX + Math.cos(angle) * (radius + 20);
            const y = centerY + Math.sin(angle) * (radius + 20);
            ctx.fillText(labels[i], x, y);
        }
    } else {
        // 使用Chart.js绘制雷达图
        setTimeout(() => {
            try {
                const riasecValues = Object.values(riasec);
                new Chart(document.getElementById('res-radar'), {
                    type: 'radar',
                    data: {
                        labels: ['R(实干)','I(研究)','A(艺术)','S(社交)','E(统帅)','C(秩序)'],
                        datasets: [{
                            data: riasecValues,
                            borderColor: '#00f3ff',
                            borderWidth: 3,
                            backgroundColor: 'rgba(0, 243, 255, 0.2)',
                            pointBackgroundColor: '#00f3ff',
                            pointBorderColor: '#00f3ff',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            r: {
                                beginAtZero: true,
                                max: 24,
                                grid: { color: 'rgba(0, 243, 255, 0.3)', circular: true },
                                angleLines: { color: 'rgba(0, 243, 255, 0.4)' },
                                pointLabels: {
                                    color: 'rgba(255, 255, 255, 0.8)',
                                    font: { size: 12, weight: 'bold' }
                                },
                                ticks: { display: false }
                            }
                        },
                        plugins: { legend: { display: false } },
                        animation: { duration: 1500, easing: 'easeInOutQuart' }
                    }
                });
            } catch (error) {
                console.error('雷达图初始化失败:', error);
            }
        }, 300);
    }
});
    </script>
</body>
</html>
