<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>少年英雄觉醒系统 - 英雄控制面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* 参数调整说明：
               1. #2e1437 (深紫): 提升了亮度，不再是死黑，透出紫色
               2. #16362d (深绿): 对应你截图中的绿色，但更有光泽
               3. #3a1c1c (深红): 保留了红色的温润感
               4. #1c2541 (深蓝): 经典的午夜蓝，作为冷暖色的过渡
            */
            background: linear-gradient(-45deg, #2e1437, #16362d, #3a1c1c, #1c2541);
            
            background-size: 400% 400%;
            animation: gradientDark 18s ease infinite;
        }

        @keyframes gradientDark {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="app-view" class="pt-16 flex justify-center">
        <div class="min-w-[300px] max-w-[500px] w-full bg-black rounded-[20px] shadow-2xl relative overflow-hidden">
            
            <!-- 驾驶舱页面 -->
            <section id="scr-dashboard" class="flex flex-col p-6 z-50 bg-[#050b14] overflow-y-auto min-h-[600px]">
                <!-- 驾驶舱头部 -->
                <div class="pt-10 mb-8">
                    <div class="flex justify-between items-center mb-2">
                        <h1 class="text-2xl font-bold text-white">驾驶舱 (The Cockpit)</h1>
                        <div class="flex items-center gap-2">
                            <span class="text-green-400">在线</span>
                            <span class="relative">
                                <span class="absolute -top-1 -right-1 w-3 h-3 bg-green-400 rounded-full animate-pulse"></span>
                            </span>
                        </div>
                    </div>
                    <div class="text-sm text-gray-500">神经链路已连接 | 当前同步率：98%</div>
                </div>
                
                <!-- 再次觉醒卡片 -->
                <div class="glass-panel p-6 rounded-3xl border border-white/10 mb-6 bg-gradient-to-br from-white/5 to-white/0">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-purple-600 rounded-full flex items-center justify-center">
                            <span class="material-symbols-outlined text-sm">refresh</span>
                        </div>
                        <div class="text-sm font-bold text-white">再次觉醒</div>
                    </div>
                    <div class="text-sm text-gray-300 mb-4">
                        在不同人生阶段重新进行 24 题深度扫描，以校准当前的人格偏差值
                    </div>
                    <a href="quiz.html" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-purple-600 text-black font-bold orbitron rounded-xl text-sm hover:shadow-[0_0_20px_rgba(0,243,255,0.5)] transition-all block text-center">
                        启动深度扫描
                    </a>
                </div>
                
                <!-- 功能矩阵卡片 -->
                <div class="glass-panel p-6 rounded-3xl border border-white/10 mb-6 bg-gradient-to-br from-white/5 to-white/0">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-purple-600 rounded-full flex items-center justify-center">
                            <span class="material-symbols-outlined text-sm">grid_view</span>
                        </div>
                        <div class="text-sm font-bold text-white">功能矩阵</div>
                    </div>
                    <div class="text-sm text-gray-300 mb-4">
                        私人认知军火库 - 你的专属高阶认知插件
                    </div>
                    
                    <!-- 功能矩阵网格 -->
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <!-- 大脑作弊器 -->
                        <div class="glass-panel p-4 rounded-xl border border-white/10 hover:border-cyan-400 transition-all cursor-pointer">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="material-symbols-outlined text-cyan-400">brain</span>
                                <div class="text-sm font-bold text-white">大脑作弊器</div>
                            </div>
                            <div class="text-xs text-gray-400">认知增强插件</div>
                        </div>
                        
                        <!-- 人生决策红绿灯 -->
                        <div class="glass-panel p-4 rounded-xl border border-white/10 hover:border-cyan-400 transition-all cursor-pointer">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="material-symbols-outlined text-cyan-400">traffic_light</span>
                                <div class="text-sm font-bold text-white">人生决策红绿灯</div>
                            </div>
                            <div class="text-xs text-gray-400">决策辅助系统</div>
                        </div>
                        
                        <!-- 预留插件1 -->
                        <div class="glass-panel p-4 rounded-xl border border-white/10 hover:border-cyan-400 transition-all cursor-pointer opacity-50">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="material-symbols-outlined text-cyan-400">lock</span>
                                <div class="text-sm font-bold text-white">高级插件</div>
                            </div>
                            <div class="text-xs text-gray-400">即将开放</div>
                        </div>
                        
                        <!-- 预留插件2 -->
                        <div class="glass-panel p-4 rounded-xl border border-white/10 hover:border-cyan-400 transition-all cursor-pointer opacity-50">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="material-symbols-outlined text-cyan-400">lock</span>
                                <div class="text-sm font-bold text-white">高级插件</div>
                            </div>
                            <div class="text-xs text-gray-400">即将开放</div>
                        </div>
                    </div>
                </div>
                
                <!-- 退出驾驶舱按钮 -->
                <a href="index.html" class="w-full py-4 bg-white/5 border border-white/10 rounded-xl text-sm text-white hover:bg-red-500/20 hover:border-red-500 transition-all text-center block">
                    退出驾驶舱
                </a>
            </section>
        </div>
    </div>

</body>
</html>
