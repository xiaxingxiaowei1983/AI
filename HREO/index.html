<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>少年英雄觉醒系统 v9.5 Full Spec</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #sword-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }
        
        @keyframes breathe {
            0%, 100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }
        
        .animate-breathe {
            animation: breathe 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <canvas id="sword-canvas"></canvas>

    <div class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur border-b border-white/10 h-12 flex justify-between items-center px-6">
        <div class="text-[#00f3ff] font-bold orbitron text-xs">SYSTEM v8.0 // READY</div>
        <div class="flex gap-4">
            <button onclick="alert('PRD视图已隐藏')" class="text-[10px] text-gray-500 hover:text-white uppercase">PRD</button>
            <button onclick="alert('Prototype视图已显示')" class="text-[10px] text-[#00f3ff] uppercase">Prototype</button>
        </div>
    </div>

    <div class="relative z-20 pt-12 flex justify-center min-h-full">
        <div class="w-[90vw] max-w-[500px] aspect-square bg-transparent rounded-[20px] m-4 relative overflow-hidden">
            
            <!-- 卡片内容 - 正方形 -->
            <section class="w-full h-full flex flex-col items-center justify-center p-8 bg-black/70 rounded-[20px] relative z-20">
                <div class="w-24 h-24 mb-8 flex items-center justify-center bg-black/80 rounded-full">
                    <span class="material-symbols-outlined text-6xl text-white animate-breathe">fingerprint</span>
                </div>
                
                <h1 class="text-2xl font-bold text-center bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500 mb-4">少年英雄觉醒系统</h1>
                <p class="text-[10px] text-gray-500 tracking-[0.3em] mb-16">启动神经链路，开启 360° 潜能扫描</p>
                
                <a href="dash.html" class="w-full py-4 bg-[#00f3ff] text-black font-black orbitron rounded-xl shadow-[0_0_20px_#00f3ff] hover:shadow-[0_0_30px_#00f3ff] hover:border-[#00f3ff] transition-all duration-300 mb-4 text-center block hover:bg-opacity-90">
                    解封天赋，接管主场
                </a>
                
                <a href="auth.html" class="w-full py-4 bg-black border-2 border-[#00f3ff] text-[#00f3ff] font-black orbitron rounded-xl hover:shadow-[0_0_20px_#00f3ff] hover:bg-cyan-400/10 transition-all duration-300 text-center block">
                    英雄回归登录
                </a>
            </section>
        </div>
    </div>

    <script>
    (function() {
        const canvas = document.getElementById('sword-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        let width, height;
        let particles = [];
        let mouse = { x: 0, y: 0 };
        const particleCount = 150;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            mouse.x = width / 2;
            mouse.y = height / 2;
        }
        resize();
        window.addEventListener('resize', resize);
        
        const colors = [];
        for (let i = 0; i < particleCount; i++) {
            const hue = 180 + Math.random() * 60;
            colors.push(`hsl(${hue}, 100%, 50%)`);
        }
        
        class Particle {
            constructor(i) {
                this.i = i;
                this.reset();
            }
            
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(width, height) * 0.6 + Math.random() * 150;
                this.x = Math.cos(angle) * dist + width / 2;
                this.y = Math.sin(angle) * dist + height / 2;
                this.vx = 0;
                this.vy = 0;
                this.size = 1.5 + Math.random() * 1.5;
                this.speed = 2 + Math.random() * 2;
                this.color = colors[this.i];
                this.prevX = this.x;
                this.prevY = this.y;
            }
            
            update() {
                this.prevX = this.x;
                this.prevY = this.y;
                
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 5) {
                    const force = 80 / (dist + 40);
                    this.vx += (dx / dist) * force * this.speed;
                    this.vy += (dy / dist) * force * this.speed;
                    
                    const angle = Math.atan2(dy, dx) + Math.PI / 2;
                    this.vx += Math.cos(angle) * force;
                    this.vy += Math.sin(angle) * force;
                }
                
                this.vx *= 0.95;
                this.vy *= 0.95;
                
                this.x += this.vx;
                this.y += this.vy;
                
                if (dist < 10) {
                    this.reset();
                }
                
                const d = Math.sqrt((this.x - width/2)**2 + (this.y - height/2)**2);
                if (d > Math.max(width, height) * 0.7) this.reset();
            }
            
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.prevX, this.prevY);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.globalAlpha = 0.7;
                ctx.stroke();
                ctx.globalAlpha = 1;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }
        
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle(i));
        }
        
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 25);
            g.addColorStop(0, 'rgba(0, 243, 255, 0.4)');
            g.addColorStop(1, 'rgba(0, 243, 255, 0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 25, 0, Math.PI * 2);
            ctx.fill();
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        document.addEventListener('mousemove', function(e) {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });
    })();
    </script>
</body>
</html>
