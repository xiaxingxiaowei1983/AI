<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>少年英雄觉醒系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            color: #00f3ff;
            position: relative;
        }
        
        /* 赛博朋克背景 - 网格线 + 扫描线 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            animation: gridMove 20s linear infinite;
        }
        
        /* 扫描线效果 */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 2;
            pointer-events: none;
            animation: scanline 6s linear infinite;
        }
        
        /* 动态渐变背景 */
        .cyber-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #0f0f23, #1a1a2e, #16213e, #0f3460);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            z-index: 0;
        }
        
        /* 霓虹发光边框 */
        .cyber-box {
            position: relative;
            padding: 40px;
            border: 2px solid #00f3ff;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 
                0 0 20px rgba(0, 243, 255, 0.5),
                inset 0 0 20px rgba(0, 243, 255, 0.1);
            overflow: hidden;
        }
        
        /* 边框扫描动画 */
        .cyber-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00f3ff, #ff00f3, #00f3ff, #ff00f3);
            border-radius: 10px;
            z-index: -1;
            background-size: 400% 400%;
            animation: borderGlow 3s linear infinite;
        }
        
        /* 故障效果 */
        @keyframes glitch {
            0%, 100% {
                transform: translate(0);
            }
            20% {
                transform: translate(-2px, 2px);
            }
            40% {
                transform: translate(-2px, -2px);
            }
            60% {
                transform: translate(2px, 2px);
            }
            80% {
                transform: translate(2px, -2px);
            }
        }
        
        /* 网格移动动画 */
        @keyframes gridMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 50px 50px;
            }
        }
        
        /* 扫描线动画 */
        @keyframes scanline {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(100%);
            }
        }
        
        /* 渐变背景动画 */
        @keyframes gradientShift {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        
        /* 边框发光动画 */
        @keyframes borderGlow {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        
        .section {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 3;
        }
        
        .hidden {
            display: none;
        }
        
        /* 标题样式 */
        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00f3ff;
            text-shadow: 
                0 0 10px rgba(0, 243, 255, 0.8),
                0 0 20px rgba(0, 243, 255, 0.5);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }
        
        /* 标题发光动画 */
        @keyframes titleGlow {
            from {
                text-shadow: 0 0 10px rgba(0, 243, 255, 0.8), 0 0 20px rgba(0, 243, 255, 0.5);
            }
            to {
                text-shadow: 0 0 20px rgba(0, 243, 255, 1), 0 0 40px rgba(0, 243, 255, 0.8);
            }
        }
        
        /* 副标题样式 */
        p {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 40px;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        /* 脉冲动画 */
        @keyframes pulse {
            0%, 100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }
        
        /* 按钮样式 */
        button {
            font-family: 'Orbitron', monospace;
            padding: 15px 30px;
            background: transparent;
            color: #00f3ff;
            border: 2px solid #00f3ff;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin: 10px;
        }
        
        /* 按钮悬停效果 */
        button:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 
                0 0 30px rgba(0, 243, 255, 0.8),
                0 0 60px rgba(0, 243, 255, 0.5);
            transform: translateY(-2px);
        }
        
        /* 按钮点击效果 */
        button:active {
            transform: translateY(0);
        }
        
        /* 输入框样式 */
        input {
            font-family: 'Share Tech Mono', monospace;
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.6);
            color: #00f3ff;
            border: 2px solid #00f3ff;
            border-radius: 5px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        
        /* 输入框聚焦效果 */
        input:focus {
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            border-color: #ff00f3;
        }
        
        /* 输入框占位符样式 */
        input::placeholder {
            color: rgba(0, 243, 255, 0.5);
        }
        
        /* 按钮容器 */
        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .cyber-box {
                padding: 20px;
            }
            
            .button-group {
                flex-direction: column;
                width: 100%;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 赛博朋克背景 -->
    <div class="cyber-bg"></div>
    
    <!-- 启动页 -->
    <section id="scr-splash" class="section">
        <div class="cyber-box">
            <h1>少年英雄觉醒系统</h1>
            <p>启动神经链路，开启 360° 潜能扫描</p>
            <button onclick="
                document.getElementById('scr-splash').classList.add('hidden');
                document.getElementById('scr-channelB').classList.remove('hidden');
            ">解封天赋，接管主场</button>
        </div>
    </section>
    
    <!-- 通道B：待觉醒英雄 -->
    <section id="scr-channelB" class="section hidden">
        <div class="cyber-box">
            <h1>建立临时神经链接</h1>
            <p>请输入代号或直接开始</p>
            <input type="text" placeholder="请输入代号">
            <div class="button-group">
                <button>直接开始</button>
                <button>确认代号</button>
            </div>
        </div>
    </section>
</body>
</html>
