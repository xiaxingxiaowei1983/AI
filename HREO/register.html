<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>少年英雄觉醒系统 - 注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="styles.css">
    <script src="sys.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* 参数调整说明：
               1. #2e1437 (深紫): 提升了亮度，不再是死黑，透出紫色
               2. #16362d (深绿): 对应你截图中的绿色，但更有光泽
               3. #3a1c1c (深红): 保留了红色的温润感
               4. #1c2541 (深蓝): 经典的午夜蓝，作为冷暖色的过渡
            */
            background: linear-gradient(-45deg, #2e1437, #16362d, #3a1c1c, #1c2541);
            
            background-size: 400% 400%;
            animation: gradientDark 18s ease infinite;
        }

        @keyframes gradientDark {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="app-view" class="pt-16 flex justify-center">
        <div class="min-w-[300px] max-w-[500px] w-full bg-black rounded-[20px] shadow-2xl relative overflow-hidden">
            
            <!-- 注册页面 -->
            <section id="scr-register" class="flex flex-col items-center justify-center p-8 z-50 bg-[#050b14] min-h-[600px]">
                <div class="text-center max-w-md">
                    <a href="auth.html" class="absolute top-6 left-6 text-white hover:text-[var(--neon-cyan)] transition-colors">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </a>
                    <h1 class="text-2xl font-bold text-white mb-4">地球 Online</h1>
                    <p class="text-sm text-gray-400 mb-8">觉醒系统只是角色界面创建，真正的游戏现在才开始。</p>
                    
                    <div class="space-y-4 mb-8">
                        <input type="text" placeholder="用户名" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20 transition-all">
                        <input type="email" placeholder="邮箱" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20 transition-all">
                        <input type="password" placeholder="密码" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20 transition-all">
                        <input type="password" placeholder="确认密码" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20 transition-all">
                    </div>
                    
                    <a href="auth.html" class="w-full py-4 bg-gradient-to-r from-cyan-500 to-purple-600 text-black font-bold orbitron rounded-xl text-sm hover:shadow-[0_0_20px_rgba(0,243,255,0.5)] transition-all transform hover:scale-[1.02] mb-4 inline-block text-center">
                            注册并进入地球 Online
                        </a>
                    
                    <div class="text-center text-xs text-gray-500">
                        <p>已有账号？ <a href="auth.html" class="text-cyan-400 cursor-pointer hover:underline">登录</a></p>
                    </div>
                </div>
            </section>
        </div>
    </div>

</body>
</html>
