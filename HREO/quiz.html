<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>少年英雄觉醒系统 - 测评</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="styles.css">
    <script src="system-data.js"></script>
    <script src="sys.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* 参数调整说明：
               1. #2e1437 (深紫): 提升了亮度，不再是死黑，透出紫色
               2. #16362d (深绿): 对应你截图中的绿色，但更有光泽
               3. #3a1c1c (深红): 保留了红色的温润感
               4. #1c2541 (深蓝): 经典的午夜蓝，作为冷暖色的过渡
            */
            background: linear-gradient(-45deg, #2e1437, #16362d, #3a1c1c, #1c2541);
            
            background-size: 400% 400%;
            animation: gradientDark 18s ease infinite;
        }

        @keyframes gradientDark {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- 主内容区 - 居中容器 -->
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-[500px] flex flex-col">
            <!-- 警告栏 - 蓝紫色渐变，位于色块上方 -->
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white text-xs p-3 mb-4 flex justify-between items-center rounded-lg z-10 relative">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">warning</span>
                    <span>警告：当前英雄档案未存档，请在觉醒后认证英雄身份</span>
                </div>
                <a href="auth.html" class="bg-black text-white px-3 py-1 rounded text-xs font-bold">立即登录</a>
            </div>
            
            <!-- 赛博朋克色块容器 - 包含所有元素 -->
            <div class="w-full bg-[#0a0f1a] border-2 border-cyan-400 rounded-xl p-6 shadow-[0_0_20px_rgba(0,243,255,0.3)]">
                <!-- 进度显示和关闭按钮 -->
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-4">
                        <span id="quiz-phase" class="text-[10px] text-cyan-400 orbitron">第一阶段：战场定位</span>
                        <span id="quiz-pct" class="text-[10px] text-cyan-400">1/24</span>
                    </div>
                    <a href="index.html" class="text-gray-500 hover:text-white">
                        <span class="material-symbols-outlined text-sm">close</span>
                    </a>
                </div>
                
                <!-- 进度条 -->
                <div class="mb-6">
                    <div class="h-1 bg-gray-800 rounded-full overflow-hidden">
                        <div id="quiz-progress" class="h-full bg-gradient-to-r from-cyan-500 to-purple-600 w-0 transition-all duration-300"></div>
                    </div>
                    <div class="text-right text-[10px] text-cyan-400 mt-1">4% 完成</div>
                </div>
                
                <!-- 答题框 - 无额外边框，使用父容器边框 -->
                <div class="mb-6">
                    <p id="q-text" class="text-white text-base font-medium mb-2"></p>
                    <p class="text-gray-400 text-xs">请选择最符合你的选项</p>
                </div>
                <div id="q-opts" class="space-y-4 mb-6"></div>
                
                <!-- 底部导航 -->
                <div class="flex justify-start">
                    <button id="prev-btn" class="bg-transparent border-2 border-cyan-400 text-cyan-400 px-4 py-2 rounded text-xs hover:bg-cyan-400/10 hover:shadow-[0_0_15px_rgba(0,243,255,0.5)] transition-all">
                        ← 上一题
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 页面加载时渲染第一题
document.addEventListener('DOMContentLoaded', () => {
    // 重置测评状态
    sys.reset();
    // 渲染第一题
    sys.renderQ();
});
    </script>
</body>
</html>
