version: '3.8'

services:
  # MongoDB数据库
  mongodb:
    image: mongo:6.0
    container_name: awkn-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: awkn2024
      MONGO_INITDB_DATABASE: awkn
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - awkn-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: awkn-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGODB_URI=mongodb://admin:awkn2024@mongodb:27017/awkn?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - mongodb
    networks:
      - awkn-network
    volumes:
      - ./backend/src:/app/src

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: awkn-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:4000/api}
    depends_on:
      - backend
    networks:
      - awkn-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  awkn-network:
    driver: bridge
