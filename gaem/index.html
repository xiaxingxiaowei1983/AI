<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人生决策红绿灯</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 基础样式 */
        body {
            font-family: 'Arial', sans-serif;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a12 50%, #000000 100%);
            color: white;
            overflow-x: hidden;
        }

        /* 容器样式 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4px;
            position: relative;
            z-index: 10;
        }

        /* 星光背景 */
        .star-background {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(138, 43, 226, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        /* 头部样式 */
        header {
            text-align: center;
            margin-bottom: 48px;
            padding-top: 48px;
        }

        h1 {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 16px;
            position: relative;
        }

        h1 .purple-text {
            color: #8A2BE2;
            text-shadow: 0 0 8px rgba(138, 43, 226, 0.8);
        }

        h1 .cyan-text {
            color: #00FFFF;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.8);
        }

        h1 .title-line {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            height: 4px;
            background: linear-gradient(to right, #8A2BE2, #00FFFF);
            border-radius: 2px;
            opacity: 0.7;
        }

        .subtitle {
            color: #ccc;
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
            font-family: monospace;
            opacity: 0.8;
        }

        /* 主内容区 */
        main {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 玻璃卡片效果 */
        .glass-card {
            position: relative;
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(138, 43, 226, 0.3);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.2);
            transition: all 0.5s ease;
        }

        /* 表单样式 */
        .form-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 32px;
            letter-spacing: 1px;
        }

        .form-title .cyan-text {
            color: #00FFFF;
            text-shadow: 0 0 4px rgba(0, 255, 255, 0.8);
        }

        .form-group {
            margin-bottom: 32px;
        }

        .form-label {
            display: block;
            color: #ccc;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            background-color: transparent;
            border-bottom: 2px solid rgba(138, 43, 226, 0.4);
            border-radius: 0;
            padding: 12px;
            color: white;
            font-family: monospace;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            resize: none;
        }

        .form-textarea {
            height: 96px;
        }

        .form-input:focus,
        .form-textarea:focus {
            border-color: #00FFFF;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: #666;
        }

        /* 网格布局 */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* 按钮样式 */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, #8A2BE2, #00FFFF);
            color: white;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
        }

        .submit-btn .btn-text {
            position: relative;
            z-index: 10;
        }

        .btn-glow {
            position: absolute;
            inset: 0;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .submit-btn:hover .btn-glow {
            opacity: 1;
        }

        /* 加载状态 */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .compass-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 160px;
            margin-bottom: 32px;
        }

        .compass {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .compass-ring {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(138, 43, 226, 0.5);
            border-radius: 50%;
        }

        .compass-ring-inner {
            position: absolute;
            inset: 16px;
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 50%;
        }

        .compass-center {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .compass-dial {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(to right, rgba(138, 43, 226, 0.3), rgba(0, 255, 255, 0.3));
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            font-weight: bold;
            font-family: monospace;
        }

        /* 终端日志 */
        .terminal-log {
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 16px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid rgba(138, 43, 226, 0.3);
            height: 160px;
            overflow-y: auto;
        }

        .log-line {
            color: #ccc;
            margin-bottom: 8px;
        }

        .log-prompt {
            color: #8A2BE2;
            margin-right: 8px;
        }

        .log-cursor {
            animation: blink 1s infinite;
        }

        /* 结果卡片 */
        .result-container {
            text-align: center;
        }

        .result-sphere {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 144px;
            height: 144px;
            border-radius: 50%;
            margin-bottom: 32px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            font-weight: bold;
            font-family: monospace;
            font-size: 18px;
        }

        .result-sphere.red {
            background-color: rgba(248, 113, 113, 0.3);
            box-shadow: 0 0 20px rgba(248, 113, 113, 0.6), 0 0 40px rgba(248, 113, 113, 0.4);
            animation: pulse-red 2s infinite ease-in-out;
        }

        .result-sphere.green {
            background-color: rgba(74, 222, 128, 0.3);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.6), 0 0 40px rgba(74, 222, 128, 0.4);
            animation: pulse-green 2s infinite ease-in-out;
        }

        .result-sphere.amber {
            background-color: rgba(251, 191, 36, 0.3);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.6), 0 0 40px rgba(251, 191, 36, 0.4);
            animation: pulse-amber 2s infinite ease-in-out;
        }

        /* 决策背景回顾 */
        .decision-context {
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid rgba(138, 43, 226, 0.3);
        }

        .context-title {
            color: #00FFFF;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .context-text {
            color: #ccc;
            font-family: monospace;
        }

        /* 分析结果 */
        .analysis-section {
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 32px;
            border: 1px solid rgba(138, 43, 226, 0.3);
        }

        .analysis-title {
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .analysis-title.red {
            color: #f87171;
        }

        .analysis-title.green {
            color: #4ade80;
        }

        .analysis-title.amber {
            color: #fbbf24;
        }

        .analysis-list {
            list-style: none;
        }

        .analysis-item {
            color: #ccc;
            font-family: monospace;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
        }

        .analysis-dot {
            margin-right: 8px;
            margin-top: 6px;
        }

        .analysis-dot.red {
            color: #f87171;
        }

        .analysis-dot.green {
            color: #4ade80;
        }

        .analysis-dot.amber {
            color: #fbbf24;
        }

        /* 重置按钮 */
        .reset-btn {
            padding: 12px 32px;
            background: linear-gradient(to right, #8A2BE2, #00FFFF);
            color: white;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .reset-btn:hover {
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
        }

        /* 页脚 */
        footer {
            margin-top: 64px;
            text-align: center;
            color: #666;
            font-family: monospace;
            font-size: 14px;
        }

        .footer-sub {
            margin-top: 8px;
            color: rgba(138, 43, 226, 0.6);
        }

        /* 动画 */
        @keyframes pulse-slow {
            0%, 100% {
                box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
            }
            50% {
                box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
            }
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spin-reverse-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 20px rgba(248, 113, 113, 0.6), 0 0 40px rgba(248, 113, 113, 0.4); }
            50% { box-shadow: 0 0 30px rgba(248, 113, 113, 0.8), 0 0 60px rgba(248, 113, 113, 0.6); }
        }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 20px rgba(74, 222, 128, 0.6), 0 0 40px rgba(74, 222, 128, 0.4); }
            50% { box-shadow: 0 0 30px rgba(74, 222, 128, 0.8), 0 0 60px rgba(74, 222, 128, 0.6); }
        }

        @keyframes pulse-amber {
            0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.6), 0 0 40px rgba(251, 191, 36, 0.4); }
            50% { box-shadow: 0 0 30px rgba(251, 191, 36, 0.8), 0 0 60px rgba(251, 191, 36, 0.6); }
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 动画类 */
        .animate-pulse-slow {
            animation: pulse-slow 3s infinite ease-in-out;
        }

        .animate-spin-slow {
            animation: spin-slow 15s linear infinite;
        }

        .animate-spin-reverse-slow {
            animation: spin-reverse-slow 20s linear infinite;
        }

        .animate-fade-in {
            animation: fade-in 0.8s ease-out;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }
            
            .subtitle {
                font-size: 16px;
            }
            
            .glass-card {
                padding: 16px;
            }
            
            .form-title {
                font-size: 20px;
            }
            
            .result-sphere {
                width: 120px;
                height: 120px;
                font-size: 16px;
            }
        }

        /* 登录弹窗样式 */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-modal-content {
            background-color: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            position: relative;
        }
        
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background-color: transparent;
            color: #00FFFF;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-title {
            color: #00FFFF;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .form-group-login {
            margin-bottom: 15px;
        }
        
        .form-label-login {
            display: block;
            color: #00FFFF;
            margin-bottom: 5px;
            fontSize: 14px;
        }
        
        .form-input-login {
            width: 100%;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 5px;
            color: white;
            fontSize: 16px;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, rgba(138, 43, 226, 0.7), rgba(0, 255, 255, 0.7));
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            fontWeight: bold;
            transition: all 0.3s ease;
        }
        
        .user-status {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        
        .login-btn-header {
            padding: 8px 16px;
            background-color: rgba(138, 43, 226, 0.7);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .user-info {
            color: #00FFFF;
            fontSize: 14px;
        }
        
        .upgrade-btn {
            padding: 8px 16px;
            background-color: rgba(0, 255, 255, 0.7);
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            fontWeight: bold;
        }
        
        /* 历史记录样式 */
        .history-section {
            margin-top: 20px;
            padding: 15px;
            background-color: rgba(26, 26, 46, 0.8);
            borderRadius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        .history-title {
            color: #00FFFF;
            marginBottom: 10px;
            fontSize: 16px;
        }
        
        .history-list {
            maxHeight: 200px;
            overflowY: auto;
        }
        
        .history-item {
            marginBottom: 10px;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            borderRadius: 5px;
        }
        
        .history-time {
            fontSize: 12px;
            color: #ccc;
            marginBottom: 5px;
        }
        
        .history-result {
            fontSize: 14px;
            fontWeight: bold;
            color: var(--result-color, #ccc);
        }
        
        .history-context {
            fontSize: 12px;
            color: #aaa;
            overflow: hidden;
            textOverflow: 'ellipsis';
            whiteSpace: 'nowrap';
        }
        
        /* 仪表盘样式 */
        .dashboard-page {
            background-color: #050505;
            min-height: 100vh;
            font-family: monospace;
        }
        
        /* Top Status Bar */
        .hud-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            z-index: 1000;
            font-family: monospace;
        }
        
        .hud-logo {
            color: #00FFFF;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }
        
        .hud-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4ade80;
        }
        
        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 5px rgba(74, 222, 128, 0.7); }
            50% { opacity: 0.7; box-shadow: 0 0 15px rgba(74, 222, 128, 1); }
        }
        
        /* Dashboard Container */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px 20px;
        }
        
        /* Daily Energy Bar */
        .energy-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .energy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .energy-label {
            color: #ccc;
            font-size: 14px;
        }
        
        .energy-value {
            color: #fbbf24;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.7);
        }
        
        .action-chips {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: thin;
        }
        
        .action-chip {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            padding: 10px 15px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
            text-align: center;
        }
        
        .action-chip:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        
        .chip-title {
            color: #00FFFF;
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        .chip-subtext {
            color: #ccc;
            font-size: 12px;
        }
        
        /* Bento Grid */
        .bento-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (min-width: 768px) {
            .bento-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        /* Bento Card */
        .bento-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .bento-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }
        
        .bento-card:hover::before {
            transform: translateX(100%);
        }
        
        .bento-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .bento-card.wealth {
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
        
        .bento-card.wealth:hover {
            border-color: rgba(74, 222, 128, 0.7);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }
        
        .bento-card.love {
            border: 1px solid rgba(236, 72, 153, 0.3);
        }
        
        .bento-card.love:hover {
            border-color: rgba(236, 72, 153, 0.7);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.3);
        }
        
        .card-icon {
            font-size: 48px;
            margin-bottom: 15px;
            animation: pulse 3s infinite;
        }
        
        .card-title {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .card-subtitle {
            color: #ccc;
            font-size: 14px;
        }
        
        /* Destiny Rewrite Card */
        .destiny-card {
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.2), rgba(168, 85, 247, 0.2));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(217, 119, 6, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
        }
        
        .destiny-title {
            color: #fbbf24;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.7);
        }
        
        .destiny-subtitle {
            color: #ccc;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .destiny-action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fbbf24;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;

                // 计算八字相关参数

                const monthPillar = month % 12;
                const dayPillar = day % 30;
                const hourPillar = hour % 12;

                let usefulGod;
                if (dayElement === monthElement) {
                    usefulGod = elements[(elements.indexOf(dayElement) + 2) % 5];
                } else {
                    usefulGod = elements[(elements.indexOf(dayElement) + 1) % 5];

                        yearPillar,
                        monthPillar,
                        dayPillar,
                        hourPillar,

                        month,
                        day,

                const month = birthDateTime.getMonth() + 1;
                const day = birthDateTime.getDate();
                const hour = birthDateTime.getHours();
                
                // 大六壬风险计算（基于时间、地点和八字喜用神）
                let riskScore = 0;
                
                // 当前时间因素
                const currentHour = currentDate.getHours();
                const currentMonth = currentDate.getMonth() + 1;
                const currentDay = currentDate.getDate();

                riskScore += currentMonth * 1.2;
                riskScore += currentDay * 0.8;

                riskScore += location.province.length * 0.5;

                if (hasOpportunity) riskScore -= 15;
                if (contextLength < 20) riskScore += 10;
                
                // 归一化到0-100范围

                            "大六壬分析显示时机中性，需谨慎判断",
                            "决策上下文信息不够明确",
                            "建议：等待更多信息，再做决定"
                        ]
                    };
                    
                    // 保存结果到历史记录
                    if (isLoggedIn && user) {
                        // 更新本地状态
                        const newHistoryItem = {
                            id: Date.now(),
                            timestamp: new Date().toISOString(),
                            decisionContext: formData.decisionContext,
                            result: finalResult
                        };
                        const updatedHistory = [...history, newHistoryItem];
                        setHistory(updatedHistory);
                        
                        // 保存到localStorage
                        const users = getUsers();
                        const userIndex = users.findIndex(u => u.account === user.account);
                        if (userIndex !== -1) {
                            users[userIndex].history = updatedHistory;
                            saveUsers(users);
                        }
                    }
                    
                    setDecisionResult(finalResult);
                    setAppState('result');
                }, 8000); // 8秒后显示结果
            };

            // 打字机效果实现
            const startTypingEffect = () => {
                if (logIndexRef.current >= loadingMessages.length) return;
                
                clearTimeout(typingRef.current);
                const currentMsg = loadingMessages[logIndexRef.current];
                let charIndex = 0;
                
                const typeChar = () => {
                    if (charIndex <= currentMsg.length) {
                        // 更新当前日志的显示文本
                        setLoadingLogs(prev => [
                            ...prev.slice(0, logIndexRef.current),
                            currentMsg.substring(0, charIndex),
                            ...prev.slice(logIndexRef.current + 1)
                        ]);
                        charIndex++;
                        typingRef.current = setTimeout(typeChar, 30); // 打字速度
                    } else {
                        // 当前日志打完，切换到下一条
                        logIndexRef.current++;
                        setTimeout(startTypingEffect, 800); // 每条日志间隔
                    }
                };
                
                // 添加新的日志行
                setLoadingLogs(prev => [...prev, '']);
                typeChar();
            };

            // 重置应用状态
            const resetApp = () => {
                setAppState('input');
                setFormData({
                    decisionContext: '',
                    birthDate: formData.birthDate,
                    birthTime: formData.birthTime
                });
                setDecisionResult(null);
                clearTimeout(typingRef.current);
            };

            // 设置默认出生日期（25年前）
            useEffect(() => {
                const defaultDate = new Date();
                defaultDate.setFullYear(defaultDate.getFullYear() - 25);
                const formattedDate = defaultDate.toISOString().split('T')[0];
                
                setFormData(prev => ({
                    ...prev,
                    birthDate: formattedDate,
                    birthTime: '12:00'
                }));
            }, []);

            // 清理定时器
            useEffect(() => {
                return () => {
                    clearTimeout(typingRef.current);
                };
            }, []);

            return (
                <>
                    {/* 根据当前页面渲染不同内容 */}
                    {currentPage === 'dashboard' ? (
                        <Dashboard />
                    ) : (
                        <div className="container">
                            {/* 头部标题 */}
                            <header>
                                <h1>
                                    <span className="purple-text">{contentSettings.title}</span>
                                    <div className="title-line"></div>
                                </h1>
                                <p className="subtitle">
                                    {contentSettings.subtitle}
                                </p>
                                
                                {/* 页面导航和用户状态 */}
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '15px', marginBottom: '20px' }}>
                                    {/* 页面导航 */}
                                    <div style={{ display: 'flex', justifyContent: 'center', gap: '15px' }}>
                                        <button 
                                            onClick={() => setCurrentPage('dashboard')}
                                            style={{
                                                padding: '8px 16px',
                                                backgroundColor: 'rgba(0, 255, 255, 0.2)',
                                                color: 'white',
                                                border: '1px solid rgba(0, 255, 255, 0.4)',
                                                borderRadius: '5px',
                                                cursor: 'pointer',
                                                transition: 'all 0.3s ease',
                                                fontWeight: 'bold'
                                            }}
                                        >
                                            📊 人生外挂控制台
                                        </button>
                                        <button 
                                            onClick={() => setCurrentPage('decision')}
                                            style={{
                                                padding: '8px 16px',
                                                backgroundColor: 'rgba(138, 43, 226, 0.2)',
                                                color: 'white',
                                                border: '1px solid rgba(138, 43, 226, 0.4)',
                                                borderRadius: '5px',
                                                cursor: 'pointer',
                                                transition: 'all 0.3s ease',
                                                fontWeight: 'bold'
                                            }}
                                        >
                                            🚦 决策推演
                                        </button>
                                    </div>
                                    
                                    {/* 用户状态和登录按钮 */}
                                    <div className="user-status">
                                        {isLoggedIn ? (
                                            <>
                                                <div className="user-info">
                                                    欢迎, {user.username} | {isPaidUser ? '高级会员' : '普通会员'}
                                                </div>
                                                <button 
                                                    onClick={handlePayment}
                                                    className="upgrade-btn"
                                                >
                                                    升级高级会员
                                                </button>
                                                <button 
                                                    onClick={() => {
                                                        setIsLoggedIn(false);
                                                        setUser(null);
                                                        setHistory([]);
                                                    }}
                                                    style={{
                                                        padding: '8px 16px',
                                                        backgroundColor: 'rgba(248, 113, 113, 0.7)',
                                                        color: 'white',
                                                        border: 'none',
                                                        borderRadius: '5px',
                                                        cursor: 'pointer',
                                                        transition: 'all 0.3s ease',
                                                        fontWeight: 'bold'
                                                    }}
                                                >
                                                    退出登录
                                                </button>
                                            </>
                                        ) : (
                                            <button 
                                                onClick={openLoginModal}
                                                className="login-btn-header"
                                            >
                                                登录
                                            </button>
                                        )}
                                    </div>
                                </div>
                        
                        {/* 历史记录（仅登录用户可见） */}
                        {isLoggedIn && history.length > 0 && (
                            <div className="history-section">
                                <h3 className="history-title">历史推演记录</h3>
                                <div className="history-list">
                                    {history.map((item) => (
                                        <div key={item.id} className="history-item">
                                            <p className="history-time">
                                                {new Date(item.timestamp).toLocaleString()}
                                            </p>
                                            <p className={`history-result`} style={{ color: item.result.type === 'red' ? '#f87171' : item.result.type === 'green' ? '#4ade80' : '#fbbf24' }}>
                                                {item.result.title}
                                            </p>
                                            <p className="history-context">
                                                {item.decisionContext}
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </header>

                    {/* 主内容区 */}
                    <main>
                        {/* 1. 输入表单 - 数据罗盘 */}
                        {appState === 'input' && (
                            <div className="glass-card">
                                {/* 表单标题 */}
                                <h2 className="form-title">
                                    <span className="cyan-text">命运没有标准答案，但博弈有最优解</span>
                                </h2>
                                
                                {/* 表单内容 */}
                                <form onSubmit={handleSubmit}>
                                    {/* 决策背景输入 */}
                                    <div className="form-group">
                                        <label htmlFor="decisionContext" className="form-label">
                                            {contentSettings.decisionContextLabel}
                                        </label>
                                        <textarea
                                            id="decisionContext"
                                            name="decisionContext"
                                            value={formData.decisionContext}
                                            onChange={handleInputChange}
                                            placeholder="例如：是否接受新城市的工作机会？ | Should I accept the new job offer?"
                                            required
                                            className="form-textarea"
                                        />
                                    </div>
                                    
                                    {/* 出生日期和时间 */}
                                    <div className="grid-2">
                                        <div className="form-group">
                                            <label htmlFor="birthDate" className="form-label">
                                                {contentSettings.birthDateLabel}
                                            </label>
                                            <input
                                                type="date"
                                                id="birthDate"
                                                name="birthDate"
                                                value={formData.birthDate}
                                                onChange={handleInputChange}
                                                required
                                                className="form-input"
                                                max={new Date().toISOString().split('T')[0]}
                                            />
                                        </div>
                                        
                                        <div className="form-group">
                                            <label htmlFor="birthTime" className="form-label">
                                                {contentSettings.birthTimeLabel}
                                            </label>
                                            <input
                                                type="time"
                                                id="birthTime"
                                                name="birthTime"
                                                value={formData.birthTime}
                                                onChange={handleInputChange}
                                                required
                                                className="form-input"
                                            />
                                        </div>
                                    </div>
                                    
                                    {/* 提交按钮 */}
                                    <div className="text-center pt-4">
                                        <button
                                            type="submit"
                                            className="submit-btn animate-pulse-slow"
                                        >
                                            <span className="btn-text">{contentSettings.submitButtonText}</span>
                                            <span className="btn-glow"></span>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}

                        {/* 2. 支付页面 */}
                        {appState === 'payment' && (
                            <div className="glass-card">
                                <h2 className="form-title">
                                    <span className="cyan-text">会员升级</span> · 支付
                                </h2>
                                
                                <div style={{ marginBottom: '20px' }}>
                                    <h3 style={{ color: '#00FFFF', marginBottom: '15px' }}>选择支付方式</h3>
                                    <div style={{ display: 'flex', gap: '15px', marginBottom: '20px' }}>
                                        <button
                                            onClick={() => setPaymentMethod('wechat')}
                                            style={{
                                                padding: '10px 20px',
                                                backgroundColor: paymentMethod === 'wechat' ? 'rgba(0, 255, 255, 0.7)' : 'rgba(26, 26, 46, 0.8)',
                                                color: paymentMethod === 'wechat' ? 'black' : 'white',
                                                border: '1px solid rgba(0, 255, 255, 0.3)',
                                                borderRadius: '5px',
                                                cursor: 'pointer',
                                                transition: 'all 0.3s ease',
                                                fontWeight: 'bold'
                                            }}
                                        >
                                            微信支付
                                        </button>
                                        <button
                                            onClick={() => setPaymentMethod('alipay')}
                                            style={{
                                                padding: '10px 20px',
                                                backgroundColor: paymentMethod === 'alipay' ? 'rgba(0, 255, 255, 0.7)' : 'rgba(26, 26, 46, 0.8)',
                                                color: paymentMethod === 'alipay' ? 'black' : 'white',
                                                border: '1px solid rgba(0, 255, 255, 0.3)',
                                                borderRadius: '5px',
                                                cursor: 'pointer',
                                                transition: 'all 0.3s ease',
                                                fontWeight: 'bold'
                                            }}
                                        >
                                            支付宝
                                        </button>
                                    </div>
                                </div>
                                
                                <div style={{ marginBottom: '30px', textAlign: 'center' }}>
                                    <h3 style={{ color: '#00FFFF', marginBottom: '10px' }}>高级会员套餐</h3>
                                    <p style={{ fontSize: '24px', fontWeight: 'bold', color: '#4ade80', marginBottom: '10px' }}>
                                        ¥99 / 月
                                    </p>
                                    <p style={{ color: '#ccc', fontSize: '14px' }}>
                                        无限次使用所有智能体 | 优先获取新功能 | 专属客服
                                    </p>
                                </div>
                                
                                {/* 支付二维码模拟 */}
                                <div style={{ 
                                    display: 'flex', 
                                    justifyContent: 'center', 
                                    marginBottom: '20px',
                                    padding: '20px',
                                    backgroundColor: 'rgba(26, 26, 46, 0.8)',
                                    borderRadius: '10px',
                                    border: '1px solid rgba(0, 255, 255, 0.3)'
                                }}>
                                    <div style={{
                                        width: '200px',
                                        height: '200px',
                                        backgroundColor: 'white',
                                        display: 'flex',
                                        justifyContent: 'center',
                                        alignItems: 'center',
                                        fontSize: '12px',
                                        color: 'black'
                                    }}>
                                        {paymentMethod === 'wechat' ? '微信支付二维码' : '支付宝二维码'}
                                    </div>
                                </div>
                                
                                <div style={{ textAlign: 'center' }}>
                                    <button
                                        onClick={completePayment}
                                        className="submit-btn"
                                    >
                                        <span className="btn-text">支付成功，立即开通</span>
                                        <span className="btn-glow"></span>
                                    </button>
                                    <button
                                        onClick={() => setAppState('input')}
                                        style={{
                                            marginTop: '15px',
                                            padding: '8px 16px',
                                            backgroundColor: 'rgba(248, 113, 113, 0.7)',
                                            color: 'white',
                                            border: 'none',
                                            borderRadius: '5px',
                                            cursor: 'pointer',
                                            transition: 'all 0.3s ease'
                                        }}
                                    >
                                        取消支付
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 3. 加载状态 - 全息罗盘 + 终端日志 */}
                        {appState === 'loading' && (
                            <div className="glass-card">
                                {/* 全息罗盘动画容器 */}
                                <div className="compass-container">
                                    <div className="compass">
                                        {/* 外层旋转环 */}
                                        <div className="compass-ring animate-spin-slow"></div>
                                        {/* 内层旋转环 */}
                                        <div className="compass-ring-inner animate-spin-reverse-slow"></div>
                                        {/* 中心罗盘 */}
                                        <div className="compass-center">
                                            <div className="compass-dial">推演</div>
                                        </div>
                                    </div>
                                </div>
                                
                                {/* 终端日志区域 */}
                                <div className="terminal-log">
                                    <div>
                                        {loadingLogs.map((log, index) => (
                                            <div key={index} className="log-line">
                                                <span className="log-prompt">></span>
                                                {log}
                                                {index === loadingLogs.length - 1 && <span className="log-cursor">|</span>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 4. 结果卡片 - 发光交通灯球体 */}
                        {appState === 'result' && decisionResult && (
                            <div className="glass-card animate-fade-in">
                                {/* 结果球体容器 */}
                                <div className="result-container">
                                    <div 
                                        className={`result-sphere ${decisionResult.type}`}
                                    >
                                        {decisionResult.title}
                                    </div>
                                </div>
                                
                                {/* 决策背景回顾 */}
                                <div className="decision-context">
                                    <h3 className="context-title">决策背景 / CONTEXT</h3>
                                    <p className="context-text">{formData.decisionContext || '未输入决策背景'}</p>
                                </div>
                                
                                {/* 分析结果 */}
                                <div className="analysis-section">
                                    <h3 className={`analysis-title ${decisionResult.type}`}>
                                        推演分析 / ANALYSIS
                                    </h3>
                                    <ul className="analysis-list">
                                        {decisionResult.analysis.map((item, index) => (
                                            <li key={index} className="analysis-item">
                                                <span className={`analysis-dot ${decisionResult.type}`}>•</span>
                                                {item}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                
                                {/* 重置按钮 */}
                                <div className="text-center">
                                    <button
                                        onClick={resetApp}
                                        className="reset-btn"
                                    >
                                        重新推演 (RECALCULATE)
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    {/* 页脚 */}
                    <footer>
                        <p>© 2025 人生决策红绿灯 | CYBER ASTROLOGY DECISION SYSTEM</p>
                        <p className="footer-sub">数据驱动 · 理性推演 | DATA DRIVEN · RATIONAL ANALYSIS</p>
                    </footer>
                    
                    {/* 登录弹窗 */}
                    {showLoginModal && (
                        <div className="login-modal">
                            <div className="login-modal-content">
                                {/* 关闭按钮 */}
                                <button 
                                    onClick={closeLoginModal}
                                    className="close-btn"
                                >
                                    ×
                                </button>
                                
                                {/* 登录/注册标题 */}
                                <h2 className="login-title">
                                    {isRegister ? '注册 / REGISTER' : '登录 / LOGIN'}
                                </h2>
                                
                                {/* 切换登录/注册 */}
                                <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                                    <span style={{ color: '#ccc', fontSize: '14px' }}>
                                        {isRegister ? '已有账号？' : '没有账号？'}
                                    </span>
                                    <button 
                                        onClick={() => setIsRegister(!isRegister)}
                                        style={{
                                            background: 'none',
                                            border: 'none',
                                            color: '#00FFFF',
                                            cursor: 'pointer',
                                            fontSize: '14px',
                                            fontWeight: 'bold',
                                            textDecoration: 'underline',
                                            marginLeft: '5px'
                                        }}
                                    >
                                        {isRegister ? '立即登录' : '立即注册'}
                                    </button>
                                </div>
                                
                                {/* 登录表单 */}
                                {!isRegister ? (
                                    <div>
                                        <div className="form-group-login">
                                            <label className="form-label-login">
                                                邮箱/手机号
                                            </label>
                                            <input 
                                                type="text"
                                                value={loginAccount}
                                                onChange={(e) => setLoginAccount(e.target.value)}
                                                placeholder="请输入邮箱或手机号"
                                                className="form-input-login"
                                            />
                                        </div>
                                        
                                        <div className="form-group-login">
                                            <label className="form-label-login">
                                                密码
                                            </label>
                                            <input 
                                                type="password"
                                                value={loginPassword}
                                                onChange={(e) => setLoginPassword(e.target.value)}
                                                placeholder="请输入密码"
                                                className="form-input-login"
                                            />
                                        </div>
                                        
                                        <button 
                                            type="button"
                                            onClick={handleLogin}
                                            className="login-btn"
                                        >
                                            登录
                                        </button>
                                    </div>
                                ) : (
                                    /* 注册表单 */
                                    <div>
                                        <div className="form-group-login">
                                            <label className="form-label-login">
                                                邮箱/手机号
                                            </label>
                                            <input 
                                                type="text"
                                                value={registerAccount}
                                                onChange={(e) => setRegisterAccount(e.target.value)}
                                                placeholder="请输入邮箱或手机号"
                                                className="form-input-login"
                                            />
                                        </div>
                                        
                                        <div className="form-group-login">
                                            <label className="form-label-login">
                                                密码
                                            </label>
                                            <input 
                                                type="password"
                                                value={registerPassword}
                                                onChange={(e) => setRegisterPassword(e.target.value)}
                                                placeholder="请设置密码"
                                                className="form-input-login"
                                            />
                                        </div>
                                        
                                        <button 
                                            type="button"
                                            onClick={handleRegister}
                                            className="login-btn"
                                        >
                                            注册
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            )}
        </>
    );
};

        // 渲染应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LifeDecisionTrafficLight />);
    </script>
</body>
</html>
