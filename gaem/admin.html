<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人生决策红绿灯 - 后台管理</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            overflow-x: hidden;
        }

        /* 容器样式 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部样式 */
        header {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00FFFF;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
            background-color: rgba(138, 43, 226, 0.5);
        }

        .nav-links a:hover {
            background-color: rgba(0, 255, 255, 0.7);
            color: black;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* 主内容区 */
        main {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        /* 登录页面 */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .login-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            color: #00FFFF;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #00FFFF;
            font-weight: bold;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 5px;
            color: white;
            font-size: 16px;
        }

        .form-input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            border-color: #00FFFF;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #8A2BE2, #00FFFF);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
        }

        /* 智能体管理 */
        .agents-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .agent-card {
            background-color: rgba(26, 26, 46, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .agent-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00FFFF;
        }

        .agent-description {
            color: #ccc;
            margin-bottom: 15px;
        }

        .agent-status {
            margin-bottom: 15px;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .status-active {
            background-color: rgba(74, 222, 128, 0.3);
            color: #4ade80;
        }

        .status-inactive {
            background-color: rgba(248, 113, 113, 0.3);
            color: #f87171;
        }

        .agent-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: rgba(0, 255, 255, 0.7);
            color: black;
        }

        .btn-primary:hover {
            background-color: #00FFFF;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        .btn-secondary {
            background-color: rgba(138, 43, 226, 0.7);
            color: white;
        }

        .btn-secondary:hover {
            background-color: #8A2BE2;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.7);
        }

        /* 提示词编辑 */
        .prompt-editor {
            margin-top: 20px;
        }

        .prompt-textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 5px;
            color: white;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }

        .prompt-textarea:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            border-color: #00FFFF;
        }

        /* 知识库管理 */
        .knowledge-base {
            margin-top: 30px;
        }

        .kb-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #00FFFF;
        }

        .kb-upload {
            margin-bottom: 20px;
        }

        .upload-btn {
            background-color: rgba(138, 43, 226, 0.7);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            background-color: #8A2BE2;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.7);
        }

        .kb-files {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .kb-file {
            background-color: rgba(26, 26, 46, 0.8);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        /* 用户管理 */
        .users-container {
            margin-top: 30px;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .users-table th,
        .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }

        .users-table th {
            background-color: rgba(0, 255, 255, 0.2);
            color: #00FFFF;
            font-weight: bold;
        }

        /* 支付设置 */
        .payment-settings {
            margin-top: 30px;
        }

        .payment-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .payment-method {
            background-color: rgba(26, 26, 46, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .agents-container {
                grid-template-columns: 1fr;
            }
            
            .nav-links {
                flex-direction: column;
            }
            
            header {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 模拟数据
        const mockAgents = [
            {
                id: 1,
                name: "八字喜用神智能体",
                description: "通过出生信息分析八字喜用神，提供决策建议",
                status: "active",
                prompt: "你是一位专业的八字命理分析师，请根据用户提供的出生信息，分析其八字喜用神，并结合决策上下文，给出专业的决策建议。",
                usageCount: 120
            },
            {
                id: 2,
                name: "大六壬智能体",
                description: "通过系统时间和IP地址转化为省市地点，使用大六壬进行分析",
                status: "active",
                prompt: "你是一位专业的大六壬预测师，请根据用户提供的时间和地点信息，使用大六壬进行分析，并结合决策上下文，给出专业的决策建议。",
                usageCount: 85
            }
        ];

        const mockKnowledgeBase = [
            {
                id: 1,
                name: "八字基础知识.pdf",
                size: "2.5MB",
                uploadDate: "2025-01-10",
                type: "pdf"
            },
            {
                id: 2,
                name: "大六壬入门指南.docx",
                size: "1.8MB",
                uploadDate: "2025-01-08",
                type: "docx"
            }
        ];

        const mockUsers = [
            {
                id: 1,
                username: "user1",
                email: "user1@example.com",
                registerDate: "2025-01-05",
                status: "active",
                paid: true
            },
            {
                id: 2,
                username: "user2",
                email: "user2@example.com",
                registerDate: "2025-01-07",
                status: "active",
                paid: false
            }
        ];

        // 主页面内容模拟数据
        const mockContentSettings = {
            title: "人生决策红绿灯",
            subtitle: "东方命理 × 博弈论算法 | 在不确定的世界寻找确定性",
            description: "通过AI技术，结合传统命理与现代博弈论，为您提供精准的决策建议。",
            welcomeMessage: "欢迎使用人生决策红绿灯，让我们为您的人生决策提供科学指导。",
            decisionContextLabel: "决策背景 CONTEXT",
            birthDateLabel: "出生日期 BIRTH DATE",
            birthTimeLabel: "出生时间 BIRTH TIME",
            submitButtonText: "开启人生外挂 (INITIATE)"
        };

        // 主应用组件
        const AdminApp = () => {
            const [currentPage, setCurrentPage] = useState('login');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [agents, setAgents] = useState(mockAgents);
            const [knowledgeBase, setKnowledgeBase] = useState(mockKnowledgeBase);
            const [users, setUsers] = useState(mockUsers);
            const [editingAgent, setEditingAgent] = useState(null);
            // 内容管理状态
            const [contentSettings, setContentSettings] = useState(mockContentSettings);

            // 模拟登录
            const handleLogin = (e) => {
                e.preventDefault();
                // 简单的登录验证
            if ((username === 'admin' || username === '10919669@qq.com') && password === 'admin123') {
                    setIsLoggedIn(true);
                    setCurrentPage('dashboard');
                } else {
                    alert('用户名或密码错误');
                }
            };

            // 登出
            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentPage('login');
                setUsername('');
                setPassword('');
            };

            // 切换页面
            const navigateTo = (page) => {
                setCurrentPage(page);
            };

            // 编辑智能体
            const handleEditAgent = (agent) => {
                setEditingAgent(agent);
            };

            // 保存智能体
            const handleSaveAgent = (updatedAgent) => {
                setAgents(agents.map(agent => 
                    agent.id === updatedAgent.id ? updatedAgent : agent
                ));
                setEditingAgent(null);
            };

            // 上传知识库文件
            const handleUploadKB = (e) => {
                const files = e.target.files;
                if (files.length > 0) {
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const newFile = {
                            id: knowledgeBase.length + i + 1,
                            name: file.name,
                            size: (file.size / (1024 * 1024)).toFixed(1) + 'MB',
                            uploadDate: new Date().toISOString().split('T')[0],
                            type: file.name.split('.').pop()
                        };
                        setKnowledgeBase([...knowledgeBase, newFile]);
                    }
                }
            };

            // 渲染登录页面
            const renderLogin = () => (
                <div className="login-container">
                    <h1 className="login-title">后台管理登录</h1>
                    <form onSubmit={handleLogin}>
                        <div className="form-group">
                            <label className="form-label" htmlFor="username">用户名</label>
                            <input
                                type="text"
                                id="username"
                                className="form-input"
                                value={username}
                                onChange={(e) => setUsername(e.target.value)}
                                required
                            />
                        </div>
                        <div className="form-group">
                            <label className="form-label" htmlFor="password">密码</label>
                            <input
                                type="password"
                                id="password"
                                className="form-input"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                required
                            />
                        </div>
                        <button type="submit" className="login-btn">登录</button>
                    </form>
                </div>
            );

            // 渲染后台管理页面
            const renderAdmin = () => (
                <div className="container">
                    {/* 头部导航 */}
                    <header>
                        <div className="logo">人生决策红绿灯 - 后台管理</div>
                        <nav className="nav-links">
                            <a onClick={() => navigateTo('dashboard')}>仪表盘</a>
                            <a onClick={() => navigateTo('agents')}>智能体管理</a>
                            <a onClick={() => navigateTo('knowledge')}>知识库管理</a>
                            <a onClick={() => navigateTo('content')}>内容管理</a>
                            <a onClick={() => navigateTo('users')}>用户管理</a>
                            <a onClick={() => navigateTo('payment')}>支付设置</a>
                            <a onClick={handleLogout}>登出</a>
                        </nav>
                    </header>","}}}

                    {/* 主内容区 */}
                    <main>
                        {/* 仪表盘 */}
                        {currentPage === 'dashboard' && (
                            <div>
                                <h2 style={{ color: '#00FFFF', marginBottom: '20px' }}>仪表盘</h2>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '20px', marginBottom: '30px' }}>
                                    <div style={{ backgroundColor: 'rgba(26, 26, 46, 0.8)', padding: '20px', borderRadius: '10px', border: '1px solid rgba(0, 255, 255, 0.3)' }}>
                                        <h3 style={{ color: '#00FFFF', marginBottom: '10px' }}>智能体数量</h3>
                                        <p style={{ fontSize: '32px', fontWeight: 'bold', color: '#4ade80' }}>{agents.length}</p>
                                    </div>
                                    <div style={{ backgroundColor: 'rgba(26, 26, 46, 0.8)', padding: '20px', borderRadius: '10px', border: '1px solid rgba(0, 255, 255, 0.3)' }}>
                                        <h3 style={{ color: '#00FFFF', marginBottom: '10px' }}>知识库文件</h3>
                                        <p style={{ fontSize: '32px', fontWeight: 'bold', color: '#4ade80' }}>{knowledgeBase.length}</p>
                                    </div>
                                    <div style={{ backgroundColor: 'rgba(26, 26, 46, 0.8)', padding: '20px', borderRadius: '10px', border: '1px solid rgba(0, 255, 255, 0.3)' }}>
                                        <h3 style={{ color: '#00FFFF', marginBottom: '10px' }}>注册用户</h3>
                                        <p style={{ fontSize: '32px', fontWeight: 'bold', color: '#4ade80' }}>{users.length}</p>
                                    </div>
                                    <div style={{ backgroundColor: 'rgba(26, 26, 46, 0.8)', padding: '20px', borderRadius: '10px', border: '1px solid rgba(0, 255, 255, 0.3)' }}>
                                        <h3 style={{ color: '#00FFFF', marginBottom: '10px' }}>付费用户</h3>
                                        <p style={{ fontSize: '32px', fontWeight: 'bold', color: '#4ade80' }}>{users.filter(user => user.paid).length}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 智能体管理 */}
                        {currentPage === 'agents' && (
                            <div>
                                <h2 style={{ color: '#00FFFF', marginBottom: '20px' }}>智能体管理</h2>
                                <div className="agents-container">
                                    {agents.map(agent => (
                                        <div key={agent.id} className="agent-card">
                                            <h3 className="agent-title">{agent.name}</h3>
                                            <p className="agent-description">{agent.description}</p>
                                            <div className={`agent-status ${agent.status === 'active' ? 'status-active' : 'status-inactive'}`}>
                                                {agent.status === 'active' ? '启用' : '禁用'}
                                            </div>
                                            <p style={{ color: '#ccc', fontSize: '14px', marginBottom: '15px' }}>
                                                使用次数: {agent.usageCount}
                                            </p>
                                            <div className="agent-actions">
                                                <button className="btn btn-primary" onClick={() => handleEditAgent(agent)}>
                                                    编辑
                                                </button>
                                                <button className="btn btn-secondary">
                                                    {agent.status === 'active' ? '禁用' : '启用'}
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* 智能体编辑弹窗 */}
                                {editingAgent && (
                                    <div style={{ 
                                        position: 'fixed', 
                                        top: 0, 
                                        left: 0, 
                                        right: 0, 
                                        bottom: 0, 
                                        backgroundColor: 'rgba(0, 0, 0, 0.8)', 
                                        display: 'flex', 
                                        justifyContent: 'center', 
                                        alignItems: 'center',
                                        zIndex: 1000
                                    }}>
                                        <div style={{ 
                                            backgroundColor: '#1a1a2e', 
                                            padding: '30px', 
                                            borderRadius: '10px', 
                                            width: '90%', 
                                            maxWidth: '600px',
                                            border: '1px solid rgba(0, 255, 255, 0.3)'
                                        }}>
                                            <h3 style={{ color: '#00FFFF', marginBottom: '20px' }}>编辑智能体</h3>
                                            <div className="form-group">
                                                <label className="form-label">智能体名称</label>
                                                <input 
                                                    type="text" 
                                                    className="form-input" 
                                                    value={editingAgent.name} 
                                                    onChange={(e) => setEditingAgent({...editingAgent, name: e.target.value})}
                                                />
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">描述</label>
                                                <textarea 
                                                    className="form-input" 
                                                    rows="3" 
                                                    value={editingAgent.description} 
                                                    onChange={(e) => setEditingAgent({...editingAgent, description: e.target.value})}
                                                ></textarea>
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">提示词</label>
                                                <textarea 
                                                    className="prompt-textarea" 
                                                    value={editingAgent.prompt} 
                                                    onChange={(e) => setEditingAgent({...editingAgent, prompt: e.target.value})}
                                                ></textarea>
                                            </div>
                                            <div style={{ display: 'flex', gap: '10px', marginTop: '20px' }}>
                                                <button className="btn btn-primary" onClick={() => handleSaveAgent(editingAgent)}>
                                                    保存
                                                </button>
                                                <button className="btn btn-secondary" onClick={() => setEditingAgent(null)}>
                                                    取消
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 知识库管理 */}
                        {currentPage === 'knowledge' && (
                            <div className="knowledge-base">
                                <h2 style={{ color: '#00FFFF', marginBottom: '20px' }}>知识库管理</h2>
                                <div className="kb-upload">
                                    <label className="upload-btn">
                                        上传文件
                                        <input 
                                            type="file" 
                                            multiple 
                                            style={{ display: 'none' }} 
                                            onChange={handleUploadKB}
                                        />
                                    </label>
                                </div>
                                <div className="kb-files">
                                    {knowledgeBase.map(file => (
                                        <div key={file.id} className="kb-file">
                                            <h4 style={{ color: '#00FFFF', marginBottom: '10px' }}>{file.name}</h4>
                                            <p style={{ color: '#ccc', fontSize: '14px', marginBottom: '5px' }}>大小: {file.size}</p>
                                            <p style={{ color: '#ccc', fontSize: '14px', marginBottom: '5px' }}>上传日期: {file.uploadDate}</p>
                                            <p style={{ color: '#ccc', fontSize: '14px', marginBottom: '15px' }}>类型: {file.type}</p>
                                            <button className="btn btn-secondary" style={{ padding: '5px 10px', fontSize: '12px' }}>
                                                删除
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 用户管理 */}
                        {currentPage === 'users' && (
                            <div className="users-container">
                                <h2 style={{ color: '#00FFFF', marginBottom: '20px' }}>用户管理</h2>
                                <table className="users-table">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>用户名</th>
                                            <th>邮箱</th>
                                            <th>注册日期</th>
                                            <th>状态</th>
                                            <th>付费状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {users.map(user => (
                                            <tr key={user.id}>
                                                <td>{user.id}</td>
                                                <td>{user.username}</td>
                                                <td>{user.email}</td>
                                                <td>{user.registerDate}</td>
                                                <td>
                                                    <span className={`agent-status ${user.status === 'active' ? 'status-active' : 'status-inactive'}`}>
                                                        {user.status === 'active' ? '活跃' : '禁用'}
                                                    </span>
                                                </td>
                                                <td>
                                                    <span className={`agent-status ${user.paid ? 'status-active' : 'status-inactive'}`}>
                                                        {user.paid ? '已付费' : '未付费'}
                                                    </span>
                                                </td>
                                                <td>
                                                    <button className="btn btn-primary" style={{ padding: '5px 10px', fontSize: '12px', marginRight: '5px' }}>
                                                        编辑
                                                    </button>
                                                    <button className="btn btn-secondary" style={{ padding: '5px 10px', fontSize: '12px' }}>
                                                        删除
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {/* 内容管理 */}
                        {currentPage === 'content' && (
                            <div>
                                <h2 style={{ color: '#00FFFF', marginBottom: '20px' }}>内容管理</h2>
                                <div style={{ backgroundColor: 'rgba(26, 26, 46, 0.8)', padding: '20px', borderRadius: '10px', border: '1px solid rgba(0, 255, 255, 0.3)' }}>
                                    <h3 style={{ color: '#00FFFF', marginBottom: '15px' }}>主页面文字内容</h3>
                                    <div className="form-group">
                                        <label className="form-label">页面标题</label>
                                        <input 
                                            type="text" 
                                            className="form-input" 
                                            value={contentSettings.title} 
                                            onChange={(e) => setContentSettings({...contentSettings, title: e.target.value})}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">页面副标题</label>
                                        <input 
                                            type="text" 
                                            className="form-input" 
                                            value={contentSettings.subtitle} 
                                            onChange={(e) => setContentSettings({...contentSettings, subtitle: e.target.value})}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">页面描述</label>
                                        <textarea 
                                            className="form-input" 
                                            rows="3" 
                                            value={contentSettings.description} 
                                            onChange={(e) => setContentSettings({...contentSettings, description: e.target.value})}
                                        ></textarea>
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">欢迎信息</label>
                                        <textarea 
                                            className="form-input" 
                                            rows="3" 
                                            value={contentSettings.welcomeMessage} 
                                            onChange={(e) => setContentSettings({...contentSettings, welcomeMessage: e.target.value})}
                                        ></textarea>
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">决策背景标签</label>
                                        <input 
                                            type="text" 
                                            className="form-input" 
                                            value={contentSettings.decisionContextLabel} 
                                            onChange={(e) => setContentSettings({...contentSettings, decisionContextLabel: e.target.value})}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">出生日期标签</label>
                                        <input 
                                            type="text" 
                                            className="form-input" 
                                            value={contentSettings.birthDateLabel} 
                                            onChange={(e) => setContentSettings({...contentSettings, birthDateLabel: e.target.value})}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">出生时间标签</label>
                                        <input 
                                            type="text" 
                                            className="form-input" 
                                            value={contentSettings.birthTimeLabel} 
                                            onChange={(e) => setContentSettings({...contentSettings, birthTimeLabel: e.target.value})}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">提交按钮文字</label>
                                        <input 
                                            type="text" 
                                            className="form-input" 
                                            value={contentSettings.submitButtonText} 
                                            onChange={(e) => setContentSettings({...contentSettings, submitButtonText: e.target.value})}
                                        />
                                    </div>
                                    <div style={{ display: 'flex', gap: '10px', marginTop: '20px' }}>
                                        <button className="btn btn-primary" onClick={() => {
                                            // 保存内容设置
                                            localStorage.setItem('contentSettings', JSON.stringify(contentSettings));
                                            alert('内容设置已保存');
                                        }}>
                                            保存设置
                                        </button>
                                        <button className="btn btn-secondary" onClick={() => {
                                            // 恢复默认设置
                                            setContentSettings(mockContentSettings);
                                            localStorage.removeItem('contentSettings');
                                            alert('已恢复默认设置');
                                        }}>
                                            恢复默认
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 支付设置 */}
                        {currentPage === 'payment' && (
                            <div className="payment-settings">
                                <h2 style={{ color: '#00FFFF', marginBottom: '20px' }}>支付设置</h2>
                                <div className="payment-methods">
                                    <div className="payment-method">
                                        <h3 style={{ color: '#00FFFF', marginBottom: '15px' }}>微信支付</h3>
                                        <div className="form-group">
                                            <label className="form-label">微信支付商户号</label>
                                            <input type="text" className="form-input" placeholder="请输入微信支付商户号" />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">微信支付API密钥</label>
                                            <input type="password" className="form-input" placeholder="请输入微信支付API密钥" />
                                        </div>
                                        <button className="btn btn-primary" style={{ marginTop: '15px' }}>
                                            保存设置
                                        </button>
                                    </div>
                                    <div className="payment-method">
                                        <h3 style={{ color: '#00FFFF', marginBottom: '15px' }}>支付宝</h3>
                                        <div className="form-group">
                                            <label className="form-label">支付宝商户号</label>
                                            <input type="text" className="form-input" placeholder="请输入支付宝商户号" />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">支付宝应用ID</label>
                                            <input type="text" className="form-input" placeholder="请输入支付宝应用ID" />
                                        </div>
                                        <button className="btn btn-primary" style={{ marginTop: '15px' }}>
                                            保存设置
                                        </button>
                                    </div>
                                    <div className="payment-method">
                                        <h3 style={{ color: '#00FFFF', marginBottom: '15px' }}>付费套餐设置</h3>
                                        <div className="form-group">
                                            <label className="form-label">基础套餐价格 (元/月)</label>
                                            <input type="number" className="form-input" placeholder="请输入基础套餐价格" />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">高级套餐价格 (元/月)</label>
                                            <input type="number" className="form-input" placeholder="请输入高级套餐价格" />
                                        </div>
                                        <button className="btn btn-primary" style={{ marginTop: '15px' }}>
                                            保存套餐设置
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );

            return isLoggedIn ? renderAdmin() : renderLogin();
        };

        // 渲染应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
